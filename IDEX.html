<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>IDEX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#1a1f2e;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#fff;}
#factory{position:fixed;inset:0;z-index:0;pointer-events:none;}
.overlay{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse 55% 65% at 50% 50%,rgba(18,22,38,.42) 0%,rgba(18,22,38,.7) 100%);}
.auth-wrapper{position:relative;z-index:2;width:100%;max-width:440px;padding:16px;}
.auth-card{background:rgba(20,23,35,.93);border:1px solid rgba(245,166,35,.2);border-radius:20px;padding:40px 36px;backdrop-filter:blur(14px);}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.brand-icon{width:42px;height:42px;background:#f5a623;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-text h1{font-size:1.1rem;font-weight:700;color:#fff;line-height:1.1;}
.brand-text p{font-size:.72rem;color:#6a6e85;margin-top:1px;}
label{display:block;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6a6e85;margin-bottom:6px;}
input[type=text],input[type=password]{width:100%;background:#0f1120;border:1px solid #252840;border-radius:10px;padding:13px 16px;font-size:.94rem;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:18px;}
input::placeholder{color:#3a3e58;}
input:focus{border-color:#f5a623;box-shadow:0 0 0 3px rgba(245,166,35,.12);}
.btn-primary{width:100%;padding:14px;background:#f5a623;border:none;border-radius:12px;font-size:.98rem;font-weight:700;color:#0a0c12;cursor:pointer;transition:background .2s,transform .1s;margin-bottom:12px;}
.btn-primary:hover{background:#ffbd4a;}
.btn-primary:active{transform:scale(.98);}
.btn-row{display:flex;gap:10px;}
.btn-secondary{flex:1;padding:12px;background:#161929;border:1px solid #252840;border-radius:12px;font-size:.84rem;font-weight:600;color:#c0c4de;cursor:pointer;transition:background .2s,border-color .2s,color .2s;}
.btn-secondary:hover{background:#1d2035;border-color:#f5a623;color:#f5a623;}
.btn-outline{flex:1;padding:12px;background:transparent;border:1.5px solid #f5a623;border-radius:12px;font-size:.84rem;font-weight:700;color:#f5a623;cursor:pointer;transition:background .2s;}
.btn-outline:hover{background:rgba(245,166,35,.08);}
.btn-back{width:100%;padding:12px;margin-top:10px;background:#161929;border:1px solid #252840;border-radius:12px;font-size:.84rem;font-weight:600;color:#6a6e85;cursor:pointer;transition:background .2s,color .2s;}
.btn-back:hover{background:#1d2035;color:#c0c4de;}
.section{display:none;}.section.active{display:block;}
.hint{font-size:.75rem;color:#4a4e68;margin-top:-12px;margin-bottom:18px;line-height:1.6;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1d2e;border:1px solid #252840;border-radius:12px;padding:11px 22px;font-size:.86rem;color:#fff;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:9999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.err{border-color:#e05252;color:#f08080;}
#toast.ok{border-color:#52c378;color:#7ddfaa;}
.floor-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(245,166,35,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,.07) 1px,transparent 1px);background-size:60px 60px;}
</style>
</head>
<body>
<div class="floor-grid"></div>
<canvas id="factory"></canvas>
<div class="overlay"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div id="s-login" class="section active">
      <div class="brand">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="1" width="6" height="2" rx="1" fill="#0a0c12"/>
            <circle cx="12" cy="14" r="8" stroke="#0a0c12" stroke-width="2"/>
            <path d="M12 9v5l3 2" stroke="#0a0c12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19.5 6.5l1-1" stroke="#0a0c12" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand-text"><h1>IDEX</h1></div>
      </div>
      <label for="l-user">Usuário</label>
      <input type="text" id="l-user" placeholder="Digite seu usuário..."/>
      <label for="l-pass">Senha</label>
      <input type="password" id="l-pass" placeholder="Digite sua senha..."/>
      <button class="btn-primary" onclick="doLogin()">Entrar →</button>
      <div class="btn-row">
        <button class="btn-secondary" onclick="show('s-recover')">🔑 Esqueci a senha</button>
        <button class="btn-outline" onclick="show('s-register')">＋ Criar conta</button>
      </div>
    </div>

    <div id="s-recover" class="section">
      <div class="brand">
        <div class="brand-icon" style="background:#252840;color:#f5a623;font-size:20px;">🔑</div>
        <div class="brand-text"><h1>Recuperar Senha</h1><p>Informe seu usuário para ver a senha</p></div>
      </div>
      <label for="r-user">Usuário</label>
      <input type="text" id="r-user" placeholder="Digite seu usuário..."/>
      <button class="btn-primary" onclick="doRecover()">Ver Senha →</button>
      <div id="r-result" style="display:none;margin-bottom:18px;">
        <label>Sua senha:</label>
        <input type="text" id="r-show" readonly style="color:#f5a623;letter-spacing:.1em;font-weight:700;cursor:default;margin-bottom:4px;"/>
        <p class="hint" style="margin-top:0;">Anote e faça login normalmente.</p>
      </div>
      <button class="btn-back" onclick="show('s-login')">← Voltar ao login</button>
    </div>

    <div id="s-register" class="section">
      <div class="brand">
        <div class="brand-icon" style="background:#252840;color:#f5a623;font-size:22px;">＋</div>
        <div class="brand-text"><h1>Criar Conta</h1><p>Preencha os dados para criar acesso</p></div>
      </div>
      <label for="rg-name">Nome Completo</label>
      <input type="text" id="rg-name" placeholder="Seu nome completo..."/>
      <label for="rg-user">Nome de Usuário</label>
      <input type="text" id="rg-user" placeholder="Escolha um usuário..."/>
      <label for="rg-pass">Senha</label>
      <input type="password" id="rg-pass" placeholder="Crie uma senha..."/>
      <label for="rg-pass2">Confirmar Senha</label>
      <input type="password" id="rg-pass2" placeholder="Repita a senha..."/>
      <label for="rg-code">Código de Acesso <span style="font-weight:400;text-transform:none;color:#3a3e58;">(opcional)</span></label>
      <input type="text" id="rg-code" placeholder="Informe o código fornecido..."/>
      <button class="btn-primary" onclick="doRegister()">Criar Minha Conta →</button>
      <button class="btn-back" onclick="show('s-login')">← Fazer Login</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<div id="toast"></div>

<script>
(function(){
  var cv=document.getElementById('factory'),ctx=cv.getContext('2d'),W,H;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;buildScene();}
  resize();window.addEventListener('resize',resize);

  var tick=0,crank=0,boff=0,sparks=[],smoke=[];

  /* ─── UTILS ─── */
  function addSparks(x,y,n){
    for(var i=0;i<n;i++)sparks.push({x:x,y:y,vx:(Math.random()-.5)*6,vy:-Math.random()*6-1,life:1,d:.035+Math.random()*.045});
  }
  function addSmoke(x,y){
    smoke.push({x:x,y:y,vx:(Math.random()-.5)*.4,vy:-Math.random()*.8-.3,r:3+Math.random()*4,life:.7+Math.random()*.3,d:.004+Math.random()*.003});
  }

  /* ─── SCENE LAYOUT ─── */
  var FLOOR,BELT_Y,CEIL,arms=[],engines=[];
  function buildScene(){
    FLOOR=H*.88; BELT_Y=H*.70; CEIL=H*.04;
    buildArms(); buildEngines();
  }

  /* ─── ENGINE (motor 4-cilindros) ─── */
  function drawEngine(cx,cy,s,ang,alpha){
    ctx.save();ctx.translate(cx,cy);ctx.globalAlpha=alpha||1;
    var lw=ctx.lineWidth;

    /* cárter */
    ctx.beginPath();ctx.moveTo(-54*s,74*s);ctx.lineTo(-62*s,104*s);ctx.lineTo(62*s,104*s);ctx.lineTo(54*s,74*s);ctx.closePath();
    var cg0=ctx.createLinearGradient(-54*s,74*s,54*s,104*s);
    cg0.addColorStop(0,'#23272f');cg0.addColorStop(1,'#191c22');
    ctx.fillStyle=cg0;ctx.fill();ctx.strokeStyle='#3e434f';ctx.lineWidth=.9*s;ctx.stroke();
    /* plug */
    ctx.beginPath();ctx.arc(0,92*s,4.5*s,0,Math.PI*2);
    var pg0=ctx.createRadialGradient(-1*s,91*s,.5*s,0,92*s,4.5*s);
    pg0.addColorStop(0,'#9098a0');pg0.addColorStop(1,'#404850');
    ctx.fillStyle=pg0;ctx.fill();ctx.strokeStyle='#282e38';ctx.lineWidth=.5*s;ctx.stroke();

    /* bloco principal */
    var bg=ctx.createLinearGradient(-60*s,-20*s,60*s,74*s);
    bg.addColorStop(0,'#353c4c');bg.addColorStop(.25,'#464e60');bg.addColorStop(.6,'#3c4354');bg.addColorStop(1,'#2a2f3c');
    ctx.beginPath();ctx.roundRect(-58*s,-20*s,116*s,94*s,5*s);ctx.fillStyle=bg;ctx.fill();
    ctx.strokeStyle='#525a6e';ctx.lineWidth=1.3*s;ctx.stroke();
    /* nervuras laterais */
    for(var ri=0;ri<6;ri++){
      ctx.fillStyle='rgba(60,70,90,.45)';
      ctx.beginPath();ctx.roundRect((-50+ri*20)*s,18*s,5*s,54*s,2*s);ctx.fill();
    }
    /* linha de junta cabeçote */
    ctx.strokeStyle='rgba(30,34,44,.9)';ctx.lineWidth=1.5*s;
    ctx.beginPath();ctx.moveTo(-58*s,-20*s);ctx.lineTo(58*s,-20*s);ctx.stroke();
    ctx.strokeStyle='rgba(100,110,130,.3)';ctx.lineWidth=.6*s;
    ctx.beginPath();ctx.moveTo(-57*s,-18*s);ctx.lineTo(57*s,-18*s);ctx.stroke();

    /* 4 pistões */
    var cxs=[-33*s,-11*s,11*s,33*s];
    for(var c=0;c<4;c++){
      var bx=cxs[c];
      /* bore */
      ctx.beginPath();ctx.ellipse(bx,4*s,9.5*s,5*s,0,0,Math.PI*2);
      var bore=ctx.createRadialGradient(bx-3*s,2*s,1*s,bx,4*s,9.5*s);
      bore.addColorStop(0,'#2a2e38');bore.addColorStop(1,'#0d0f14');
      ctx.fillStyle=bore;ctx.fill();ctx.strokeStyle='#606878';ctx.lineWidth=.7*s;ctx.stroke();
      /* biela */
      var py=8*s+Math.sin(ang+c*Math.PI*.5)*13*s;
      ctx.strokeStyle='rgba(100,110,140,.5)';ctx.lineWidth=2.2*s;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(bx,44*s);ctx.lineTo(bx,py+6*s);ctx.stroke();
      /* pino pistão */
      ctx.strokeStyle='rgba(160,170,190,.35)';ctx.lineWidth=.8*s;
      ctx.beginPath();ctx.moveTo(bx-6*s,py+6*s);ctx.lineTo(bx+6*s,py+6*s);ctx.stroke();
      /* face piston */
      var pf=ctx.createLinearGradient(bx-9*s,py-4*s,bx+9*s,py+5*s);
      pf.addColorStop(0,'#8e9898');pf.addColorStop(.4,'#c0c8c8');pf.addColorStop(1,'#6e7878');
      ctx.beginPath();ctx.ellipse(bx,py,9*s,4.5*s,0,0,Math.PI*2);ctx.fillStyle=pf;ctx.fill();
      ctx.strokeStyle='#404850';ctx.lineWidth=.7*s;ctx.stroke();
      /* segmento */
      ctx.strokeStyle='rgba(170,180,190,.45)';ctx.lineWidth=.6*s;
      ctx.beginPath();ctx.ellipse(bx,py+2.5*s,7.5*s,3.5*s,0,0,Math.PI*2);ctx.stroke();
    }

    /* cabeçote */
    var hg=ctx.createLinearGradient(-58*s,-66*s,58*s,-20*s);
    hg.addColorStop(0,'#30374a');hg.addColorStop(.4,'#464e62');hg.addColorStop(.8,'#393f52');hg.addColorStop(1,'#282e3e');
    ctx.beginPath();ctx.roundRect(-58*s,-66*s,116*s,46*s,5*s);ctx.fillStyle=hg;ctx.fill();
    ctx.strokeStyle='#505868';ctx.lineWidth=1.2*s;ctx.stroke();
    /* aletas */
    for(var fi=0;fi<8;fi++){
      ctx.fillStyle='rgba(70,82,106,.38)';
      ctx.beginPath();ctx.roundRect((-52+fi*14.5)*s,-62*s,3*s,38*s,1.5*s);ctx.fill();
    }

    /* tampa de válvulas */
    var vg=ctx.createLinearGradient(-52*s,-94*s,52*s,-66*s);
    vg.addColorStop(0,'#1a1e2c');vg.addColorStop(.45,'#292e40');vg.addColorStop(1,'#141820');
    ctx.beginPath();ctx.roundRect(-52*s,-96*s,104*s,30*s,7*s);ctx.fillStyle=vg;ctx.fill();
    ctx.strokeStyle='#3c4258';ctx.lineWidth=1.1*s;ctx.stroke();
    /* textura tampa */
    ctx.strokeStyle='rgba(50,58,80,.5)';ctx.lineWidth=.5*s;
    for(var ti=0;ti<6;ti++){ctx.beginPath();ctx.moveTo((-40+ti*16)*s,-93*s);ctx.lineTo((-40+ti*16)*s,-69*s);ctx.stroke();}
    /* emblema IDEX */
    ctx.fillStyle='rgba(245,166,35,.18)';ctx.beginPath();ctx.roundRect(-28*s,-90*s,56*s,22*s,4*s);ctx.fill();
    ctx.fillStyle='rgba(245,166,35,.82)';ctx.font='bold '+(6.5*s)+'px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('IDEX',0,-79*s);

    /* parafusos cabeçote */
    var bxs=[-48*s,-34*s,-12*s,12*s,34*s,48*s];
    for(var bi=0;bi<bxs.length;bi++){
      var bx2=bxs[bi];
      var bg2=ctx.createRadialGradient(bx2-s,-66*s,.4*s,bx2,-66*s,3.8*s);
      bg2.addColorStop(0,'#c0c8d0');bg2.addColorStop(.6,'#707888');bg2.addColorStop(1,'#404858');
      ctx.beginPath();ctx.arc(bx2,-66*s,3.8*s,0,Math.PI*2);ctx.fillStyle=bg2;ctx.fill();
      ctx.strokeStyle='#24282e';ctx.lineWidth=.4*s;ctx.stroke();
      /* marca hex */
      ctx.save();ctx.translate(bx2,-66*s);ctx.rotate(ang*.02);
      ctx.strokeStyle='rgba(20,24,30,.7)';ctx.lineWidth=.4*s;ctx.beginPath();
      for(var h=0;h<6;h++){var ha=h*Math.PI/3,hr=2.6*s;h===0?ctx.moveTo(Math.cos(ha)*hr,Math.sin(ha)*hr):ctx.lineTo(Math.cos(ha)*hr,Math.sin(ha)*hr);}
      ctx.closePath();ctx.stroke();ctx.restore();
    }

    /* alternador */
    var ag=ctx.createRadialGradient(58*s,8*s,2*s,62*s,12*s,17*s);
    ag.addColorStop(0,'#485070');ag.addColorStop(1,'#242a3a');
    ctx.beginPath();ctx.arc(62*s,12*s,17*s,0,Math.PI*2);ctx.fillStyle=ag;ctx.fill();
    ctx.strokeStyle='#505870';ctx.lineWidth=1*s;ctx.stroke();
    ctx.beginPath();ctx.arc(62*s,12*s,9*s,0,Math.PI*2);ctx.fillStyle='#181c28';ctx.fill();
    ctx.strokeStyle='#7a8090';ctx.lineWidth=.6*s;ctx.stroke();
    ctx.beginPath();ctx.arc(62*s,12*s,3.5*s,0,Math.PI*2);ctx.fillStyle='#555e72';ctx.fill();
    /* correia */
    ctx.strokeStyle='rgba(160,170,185,.22)';ctx.lineWidth=2.5*s;
    ctx.beginPath();ctx.arc(62*s,12*s,17*s,-Math.PI*.45,Math.PI*.25);ctx.stroke();

    /* mangueiras */
    ctx.strokeStyle='rgba(28,32,42,.88)';ctx.lineWidth=6*s;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-57*s,-42*s);ctx.bezierCurveTo(-76*s,-38*s,-78*s,-5*s,-70*s,26*s);ctx.stroke();
    ctx.strokeStyle='rgba(48,54,70,.55)';ctx.lineWidth=3.5*s;
    ctx.beginPath();ctx.moveTo(-57*s,-42*s);ctx.bezierCurveTo(-76*s,-38*s,-78*s,-5*s,-70*s,26*s);ctx.stroke();
    ctx.strokeStyle='#808898';ctx.lineWidth=2.5*s;
    ctx.beginPath();ctx.arc(-68*s,10*s,6*s,-.6,.6);ctx.stroke();

    /* fios de vela */
    var wc=['rgba(210,55,55,.75)','rgba(55,155,215,.75)','rgba(215,215,55,.75)','rgba(55,210,115,.75)'];
    for(var wi=0;wi<4;wi++){
      ctx.strokeStyle=wc[wi];ctx.lineWidth=1.5*s;
      ctx.beginPath();ctx.moveTo(cxs[wi],-96*s);
      ctx.bezierCurveTo(cxs[wi]-12*s,-114*s,cxs[wi]+6*s,-124*s,cxs[wi],-127*s);ctx.stroke();
      ctx.beginPath();ctx.arc(cxs[wi],-127*s,3.5*s,0,Math.PI*2);
      ctx.fillStyle=wc[wi].replace('.75','1');ctx.fill();
    }

    /* colector de escape */
    for(var ec=0;ec<4;ec++){
      ctx.fillStyle='#2e2424';ctx.beginPath();ctx.roundRect(cxs[ec]-7.5*s,72*s,15*s,9*s,2*s);ctx.fill();
      ctx.strokeStyle='#584040';ctx.lineWidth=.7*s;ctx.stroke();
    }
    ctx.strokeStyle='#3e2c2c';ctx.lineWidth=5*s;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-33*s,78*s);ctx.lineTo(-33*s,90*s);ctx.bezierCurveTo(-33*s,98*s,0,98*s,0,90*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(33*s,78*s);ctx.lineTo(33*s,90*s);ctx.bezierCurveTo(33*s,98*s,0,98*s,0,90*s);ctx.stroke();
    /* saída cano */
    ctx.beginPath();ctx.arc(0,98*s,6*s,0,Math.PI*2);
    ctx.fillStyle='#201818';ctx.fill();ctx.strokeStyle='#483030';ctx.lineWidth=1.5*s;ctx.stroke();

    ctx.restore();
  }

  /* ─── ESTEIRA INDUSTRIAL ─── */
  function drawBelt(y){
    var bh=22;
    /* sombra embaixo */
    ctx.fillStyle='rgba(0,0,0,.38)';ctx.fillRect(0,y+bh*.5,W,6);
    /* estrutura da esteira */
    var bg=ctx.createLinearGradient(0,y-bh*.5,0,y+bh*.5);
    bg.addColorStop(0,'#3a3f52');bg.addColorStop(.3,'#484e62');bg.addColorStop(.7,'#3c4154');bg.addColorStop(1,'#282c3a');
    ctx.fillStyle=bg;ctx.fillRect(0,y-bh*.5,W,bh);
    /* reflexo topo */
    ctx.fillStyle='rgba(200,210,240,.07)';ctx.fillRect(0,y-bh*.5,W,3);
    /* corrente */
    ctx.strokeStyle='rgba(245,166,35,.48)';ctx.lineWidth=3;ctx.setLineDash([24,14]);ctx.lineDashOffset=-boff;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.setLineDash([]);
    /* pinos da esteira */
    var roll=(boff*1.4)%88;
    for(var rx=roll;rx<W;rx+=88){
      ctx.beginPath();ctx.arc(rx,y,6,0,Math.PI*2);
      var rg=ctx.createRadialGradient(rx-2,y-2,1,rx,y,6);
      rg.addColorStop(0,'#b0b8c4');rg.addColorStop(1,'#484e5e');
      ctx.fillStyle=rg;ctx.fill();ctx.strokeStyle='#30343e';ctx.lineWidth=.8;ctx.stroke();
    }
    /* trilhos laterais em perspectiva */
    ctx.fillStyle='#222630';ctx.fillRect(0,y+bh*.5,W,8);
    ctx.fillStyle='rgba(245,166,35,.12)';ctx.fillRect(0,y+bh*.5,W,2);
  }

  /* ─── BACKGROUND FÁBRICA ─── */
  function drawBG(){
    /* piso com reflexo */
    var fg=ctx.createLinearGradient(0,FLOOR,0,H);
    fg.addColorStop(0,'#1c2030');fg.addColorStop(1,'#141620');
    ctx.fillStyle=fg;ctx.fillRect(0,FLOOR,W,H-FLOOR);
    /* linhas de piso */
    ctx.strokeStyle='rgba(245,166,35,.06)';ctx.lineWidth=1;
    for(var fx=0;fx<W;fx+=90){ctx.beginPath();ctx.moveTo(fx,FLOOR);ctx.lineTo(fx,H);ctx.stroke();}
    ctx.strokeStyle='rgba(245,166,35,.1)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,FLOOR);ctx.lineTo(W,FLOOR);ctx.stroke();
    /* faixa amarela de segurança no chão */
    ctx.strokeStyle='rgba(245,166,35,.22)';ctx.lineWidth=4;ctx.setLineDash([30,20]);
    ctx.beginPath();ctx.moveTo(0,FLOOR+18);ctx.lineTo(W,FLOOR+18);ctx.stroke();ctx.setLineDash([]);

    /* parede de fundo */
    var wg=ctx.createLinearGradient(0,0,0,FLOOR);
    wg.addColorStop(0,'#1a1e2c');wg.addColorStop(.5,'#202434');wg.addColorStop(1,'#181c28');
    ctx.fillStyle=wg;ctx.fillRect(0,0,W,FLOOR);

    /* estrutura metálica – vigas verticais */
    for(var vx=0;vx<W;vx+=140){
      ctx.fillStyle='rgba(40,46,60,.95)';ctx.fillRect(vx-4,CEIL,8,FLOOR-CEIL);
      ctx.fillStyle='rgba(80,90,110,.2)';ctx.fillRect(vx-1,CEIL,2,FLOOR-CEIL);
      /* cruzetas */
      ctx.strokeStyle='rgba(40,46,60,.6)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(vx,CEIL);ctx.lineTo(vx+70,FLOOR*.45);ctx.stroke();
      ctx.beginPath();ctx.moveTo(vx+140,CEIL);ctx.lineTo(vx+70,FLOOR*.45);ctx.stroke();
    }

    /* viga superior (overhead crane rail) */
    ctx.fillStyle='#2a2e3e';ctx.fillRect(0,CEIL,W,12);
    ctx.fillStyle='rgba(245,166,35,.18)';ctx.fillRect(0,CEIL,W,2);
    ctx.fillStyle='rgba(245,166,35,.08)';ctx.fillRect(0,CEIL+12,W,2);

    /* trilho da ponte rolante */
    ctx.fillStyle='#353a4c';ctx.fillRect(0,CEIL+20,W,8);
    ctx.fillStyle='rgba(200,210,240,.07)';ctx.fillRect(0,CEIL+20,W,2);

    /* luzes industriais no teto */
    for(var lx=100;lx<W;lx+=180){
      /* suporte */
      ctx.fillStyle='#303544';ctx.fillRect(lx-4,CEIL+12,8,28);
      /* corpo da luminária */
      ctx.beginPath();ctx.roundRect(lx-22,CEIL+38,44,16,3);
      var lamp=ctx.createLinearGradient(lx-22,CEIL+38,lx+22,CEIL+54);
      lamp.addColorStop(0,'#3a3e50');lamp.addColorStop(.5,'#484c60');lamp.addColorStop(1,'#2e3244');
      ctx.fillStyle=lamp;ctx.fill();ctx.strokeStyle='#505468';ctx.lineWidth=.8;ctx.stroke();
      /* difusor / lente */
      ctx.beginPath();ctx.roundRect(lx-18,CEIL+40,36,10,2);
      ctx.fillStyle='rgba(255,240,180,.85)';ctx.fill();
      /* halo de luz no chão */
      var cone=ctx.createRadialGradient(lx,BELT_Y*.5,10,lx,BELT_Y*.5,200);
      cone.addColorStop(0,'rgba(255,235,155,.1)');cone.addColorStop(1,'rgba(255,235,155,0)');
      ctx.fillStyle=cone;ctx.fillRect(lx-200,CEIL+54,400,FLOOR-CEIL-54);
    }

    /* painéis de controle na parede */
    var panels=[W*.12,W*.38,W*.62,W*.88];
    for(var pi=0;pi<panels.length;pi++){
      var px=panels[pi];
      ctx.beginPath();ctx.roundRect(px-24,FLOOR-160,48,130,4);
      ctx.fillStyle='#1e2230';ctx.fill();ctx.strokeStyle='#3a4050';ctx.lineWidth=1;ctx.stroke();
      /* tela */
      ctx.beginPath();ctx.roundRect(px-18,FLOOR-154,36,60,3);ctx.fillStyle='#0a1a24';ctx.fill();
      /* dados na tela */
      ctx.fillStyle='rgba(0,220,120,.7)';ctx.font='bold 7px monospace';ctx.textAlign='center';
      ctx.fillText('TMU:'+Math.floor(tick*.3+pi*100)%9999,px,FLOOR-132);
      ctx.fillStyle='rgba(245,166,35,.7)';
      ctx.fillText('OK ✓',px,FLOOR-118);
      /* botões */
      var btnc=['#e03020','#20c050','#f5a623','#2080e0'];
      for(var bn=0;bn<4;bn++){
        ctx.beginPath();ctx.arc(px-15+bn*10,FLOOR-60+Math.floor(bn/2)*14,5,0,Math.PI*2);
        var bpulse=(bn===1)?(.6+.4*Math.sin(tick*.04+pi)):1;
        ctx.fillStyle=btnc[bn].replace(')',','+bpulse+')').replace('#','rgba(').replace('e0','224').replace('50','80').replace('20','32').replace('23','35');
        /* simpler: just hardcode colors */
        ctx.fillStyle=btnc[bn];ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=.8;ctx.stroke();
      }
    }

    /* ponte rolante (overhead crane) animado */
    var craneX=(Math.sin(tick*.006)*.5+.5)*W;
    ctx.fillStyle='#2e3244';ctx.fillRect(craneX-50,CEIL+22,100,10);
    ctx.fillStyle='rgba(245,166,35,.3)';ctx.fillRect(craneX-50,CEIL+22,100,2);
    /* trolley */
    ctx.beginPath();ctx.roundRect(craneX-18,CEIL+30,36,20,3);
    var tg=ctx.createLinearGradient(craneX-18,CEIL+30,craneX+18,CEIL+50);
    tg.addColorStop(0,'#484e62');tg.addColorStop(1,'#30364a');
    ctx.fillStyle=tg;ctx.fill();ctx.strokeStyle='#585e72';ctx.lineWidth=1;ctx.stroke();
    /* cabo */
    ctx.strokeStyle='rgba(180,190,210,.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(craneX,CEIL+50);ctx.lineTo(craneX,BELT_Y-130);ctx.stroke();
    /* gancho */
    ctx.strokeStyle='#8090a0';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(craneX,BELT_Y-130);ctx.lineTo(craneX,BELT_Y-116);ctx.stroke();
    ctx.beginPath();ctx.arc(craneX+6,BELT_Y-112,6,Math.PI*.1,Math.PI*1.2);ctx.stroke();
  }

  /* ─── ROBÔ ARTICULADO (3 eixos) ─── */
  function buildArms(){
    arms=[];
    var n=Math.max(2,Math.floor(W/200));
    for(var i=0;i<n;i++){
      var ax=60+i*(W/n)+(Math.random()-.5)*20;
      arms.push({
        x:ax, my:BELT_Y-120,
        ph:i*1.5, sp:.006+Math.random()*.004,
        l1:58+Math.random()*18, l2:42+Math.random()*14, l3:20,
        st:0, si:90+Math.floor(Math.random()*110),
        type: i%3  /* 0=solda, 1=parafuso, 2=sensor */
      });
    }
  }

  function drawArm(a){
    var t=tick;
    var a1=Math.sin(t*a.sp+a.ph)*.62;
    var a2=Math.sin(t*a.sp+a.ph+1.1)*.7-.3;
    var a3=Math.sin(t*a.sp+a.ph+2.2)*.5;
    var e1x=a.x+Math.sin(a1)*a.l1, e1y=a.my+a.l1*(.78+Math.cos(a1)*.22);
    var e2x=e1x+Math.sin(a1+a2)*a.l2, e2y=e1y+a.l2*.88;
    var e3x=e2x+Math.sin(a1+a2+a3)*a.l3, e3y=e2y+a.l3*.9;

    /* base do robô */
    ctx.fillStyle='#282e3e';
    ctx.beginPath();ctx.roundRect(a.x-20,a.my-22,40,22,4);ctx.fill();
    ctx.strokeStyle='#404858';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='rgba(245,166,35,.15)';ctx.fillRect(a.x-18,a.my-6,36,4);

    function armSeg(x1,y1,x2,y2,w1,col1,col2){
      /* sombra */
      ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=w1+3;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x1+2,y1+2);ctx.lineTo(x2+2,y2+2);ctx.stroke();
      /* corpo */
      ctx.strokeStyle=col1;ctx.lineWidth=w1;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      /* reflexo */
      ctx.strokeStyle=col2;ctx.lineWidth=Math.max(1,w1-5);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    }
    armSeg(a.x,a.my,e1x,e1y,11,'#525c78','rgba(150,162,195,.25)');
    armSeg(e1x,e1y,e2x,e2y,9,'#434d68','rgba(140,152,185,.2)');
    armSeg(e2x,e2y,e3x,e3y,7,'#3a4460','rgba(130,142,175,.18)');

    /* articulação 1 (ombro) */
    var sg=ctx.createRadialGradient(a.x-2,a.my-2,1,a.x,a.my,8);
    sg.addColorStop(0,'#b0bcc8');sg.addColorStop(1,'#323e56');
    ctx.beginPath();ctx.arc(a.x,a.my,8,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
    ctx.strokeStyle='#505870';ctx.lineWidth=1;ctx.stroke();
    /* anel amarelo */
    ctx.strokeStyle='rgba(245,166,35,.6)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(a.x,a.my,9.5,0,Math.PI*2);ctx.stroke();

    /* articulação 2 (cotovelo) */
    var eg=ctx.createRadialGradient(e1x-1,e1y-1,1,e1x,e1y,7);
    eg.addColorStop(0,'#f5a623');eg.addColorStop(1,'#9a5e0a');
    ctx.beginPath();ctx.arc(e1x,e1y,7,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();
    ctx.strokeStyle='#c07818';ctx.lineWidth=.8;ctx.stroke();

    /* articulação 3 (pulso) */
    ctx.beginPath();ctx.arc(e2x,e2y,5,0,Math.PI*2);
    var wjg=ctx.createRadialGradient(e2x-1,e2y-1,1,e2x,e2y,5);
    wjg.addColorStop(0,'#90a0b0');wjg.addColorStop(1,'#404858');
    ctx.fillStyle=wjg;ctx.fill();

    /* ponteira (tool) */
    if(a.type===0){
      /* tocha de solda */
      ctx.strokeStyle='#6a7888';ctx.lineWidth=3.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(e3x,e3y);ctx.lineTo(e3x+4,e3y+10);ctx.stroke();
      ctx.strokeStyle='#9aaabb';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(e3x,e3y);ctx.lineTo(e3x+4,e3y+10);ctx.stroke();
      /* glow solda */
      var wg2=ctx.createRadialGradient(e3x+4,e3y+10,0,e3x+4,e3y+10,8);
      wg2.addColorStop(0,'rgba(255,255,180,.9)');wg2.addColorStop(.4,'rgba(245,166,35,.6)');wg2.addColorStop(1,'rgba(245,166,35,0)');
      ctx.beginPath();ctx.arc(e3x+4,e3y+10,8,0,Math.PI*2);ctx.fillStyle=wg2;ctx.fill();
      a.st++;if(a.st>=a.si){a.st=0;a.si=70+Math.floor(Math.random()*110);addSparks(e3x+4,e3y+10,22);}
    } else if(a.type===1){
      /* parafusadeira */
      ctx.beginPath();ctx.roundRect(e3x-4,e3y,8,14,2);
      ctx.fillStyle='#505868';ctx.fill();ctx.strokeStyle='#8090a0';ctx.lineWidth=.8;ctx.stroke();
      ctx.strokeStyle='rgba(245,166,35,.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(e3x,e3y+7,10,0,Math.PI*2);ctx.stroke();
    } else {
      /* sensor óptico */
      ctx.beginPath();ctx.arc(e3x,e3y+8,5,0,Math.PI*2);
      ctx.fillStyle='#1a2a3a';ctx.fill();ctx.strokeStyle='#5090c0';ctx.lineWidth=1;ctx.stroke();
      /* feixe laser */
      ctx.strokeStyle='rgba(60,180,255,.4)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(e3x,e3y+13);ctx.lineTo(e3x,e3y+40);ctx.stroke();ctx.setLineDash([]);
    }
  }

  /* ─── MOTORES NA ESTEIRA ─── */
  function buildEngines(){
    engines=[];
    var sp=300,n=Math.ceil(W/sp)+2;
    for(var i=0;i<n;i++) engines.push({x:-140+i*sp, y:BELT_Y-10});
  }

  /* ─── FUMAÇA / VAPOR ─── */
  function updateSmoke(){
    for(var si=smoke.length-1;si>=0;si--){
      var sm=smoke[si];
      sm.x+=sm.vx;sm.y+=sm.vy;sm.r+=.08;sm.life-=sm.d;
      if(sm.life<=0){smoke.splice(si,1);continue;}
      ctx.beginPath();ctx.arc(sm.x,sm.y,sm.r,0,Math.PI*2);
      ctx.fillStyle='rgba(180,190,200,'+sm.life*.18+')';ctx.fill();
    }
  }

  /* ─── MAIN LOOP ─── */
  function loop(){
    tick++;crank+=0.038;boff+=0.85;
    ctx.clearRect(0,0,W,H);
    drawBG();
    drawBelt(BELT_Y);

    /* motores */
    for(var i=0;i<engines.length;i++){
      var e=engines[i];
      e.x+=0.85;
      if(e.x>W+160)e.x=-160;
      drawEngine(e.x,e.y,.92,crank+e.x*.002);
      /* fumaça do escape */
      if(tick%8===i%8) addSmoke(e.x,e.y+86);
    }

    /* robôs */
    for(var j=0;j<arms.length;j++) drawArm(arms[j]);

    /* faíscas */
    for(var k=sparks.length-1;k>=0;k--){
      var sp2=sparks[k];sp2.x+=sp2.vx;sp2.y+=sp2.vy;sp2.vy+=0.16;sp2.life-=sp2.d;
      if(sp2.life<=0){sparks.splice(k,1);continue;}
      var bright=160+Math.floor(Math.random()*95);
      ctx.beginPath();ctx.arc(sp2.x,sp2.y,2.2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,'+bright+',16,'+sp2.life+')';ctx.fill();
    }

    /* fumaça */
    updateSmoke();

    requestAnimationFrame(loop);
  }
  loop();
})();
/* ── AUTH ── */
function show(id){document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');var r=document.getElementById('r-result');if(r)r.style.display='none';}
function toast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className='show '+(type||'');clearTimeout(el._t);el._t=setTimeout(function(){el.className='';},3200);}
function getUsers(){try{return JSON.parse(localStorage.getItem('mtm_users')||'{}');}catch(e){return{};}}
function saveUsers(u){localStorage.setItem('mtm_users',JSON.stringify(u));}
function getRole(code){var c=(code||'').trim().toUpperCase();return({'1234':'gestor','SENIOR':'senior','1':'trial'})[c]||'visualizador';}
function doLogin(){
  var user=document.getElementById('l-user').value.trim(),pass=document.getElementById('l-pass').value;
  if(!user||!pass){toast('Preencha usuário e senha.','err');return;}
  var u=getUsers();if(!u[user]){toast('Usuário não encontrado.','err');return;}
  if(u[user].senha!==pass){toast('Senha incorreta.','err');return;}
  if(u[user].role==='trial'&&(Date.now()-u[user].created)/86400000>10){toast('Acesso Trial expirado.','err');return;}
  toast('Bem-vindo, '+(u[user].nome||user)+'! ✓','ok');
}
function doRecover(){
  var user=document.getElementById('r-user').value.trim();if(!user){toast('Digite seu usuário.','err');return;}
  var u=getUsers();if(!u[user]){toast('Usuário não encontrado.','err');return;}
  document.getElementById('r-show').value=u[user].senha;document.getElementById('r-result').style.display='block';
}
function doRegister(){
  var nome=document.getElementById('rg-name').value.trim(),user=document.getElementById('rg-user').value.trim();
  var pass=document.getElementById('rg-pass').value,pass2=document.getElementById('rg-pass2').value;
  var code=document.getElementById('rg-code').value.trim();
  if(!nome||!user||!pass){toast('Preencha todos os campos obrigatórios.','err');return;}
  if(pass!==pass2){toast('As senhas não coincidem.','err');return;}
  if(pass.length<4){toast('Senha muito curta (mín. 4 caracteres).','err');return;}
  var u=getUsers();if(u[user]){toast('Este usuário já existe.','err');return;}
  u[user]={nome:nome,senha:pass,role:getRole(code),created:Date.now()};saveUsers(u);
  toast('Conta criada com sucesso! ✓','ok');setTimeout(function(){show('s-login');},1500);
}
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  var a=document.querySelector('.section.active');if(!a)return;
  if(a.id==='s-login')doLogin();else if(a.id==='s-recover')doRecover();else if(a.id==='s-register')doRegister();
});
</script>
